version: '3.8'

services:
  kafka:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    restart: unless-stopped
  
  eureka-server:
    container_name: eureka-server
    image: tech-test-eureka-server-slim
    ports:
      - "8761:8761"
  
  api-gateway:
    container_name: api-gateway
    image: tech-test-api-gateway-slim
    ports:
      - "8009:8009"
    depends_on:
      - eureka-server
  
  tech-test-spring-customer:
    container_name: tech-test-spring-customer
    image: tech-test-spring-customer
    ports:
      - "8080:8080"
    depends_on:      
      eureka-server:
          condition: service_started
      api-gateway:
          condition: service_started
    environment:
      - SPRING_DATA_MYSQL_URL=
      - SPRING_DATA_MYSQL_USERNAME=
      - SPRING_DATA_MYSQL_PASSWORD=
      - KAFKA_HOST=kafka
  
  tech-test-spring-account-movement:
    container_name: tech-test-spring-account-movement
    image: tech-test-spring-account-movement
    ports:
      - "8081:8081"
    depends_on:      
      eureka-server:
          condition: service_started
      api-gateway:
          condition: service_started
    environment:
      - SPRING_DATA_MYSQL_URL=
      - SPRING_DATA_MYSQL_USERNAME=
      - SPRING_DATA_MYSQL_PASSWORD=
      - KAFKA_HOST=kafka