openapi: 3.0.3
info:
  title: Account & Movement Service API
  description: API para gestión de cuentas bancarias y movimientos
  version: 1.0.0
servers:
  - url: http://localhost:8081
tags:
  - name: Accounts
  - name: Movements
paths:
  /v1/api/accounts:
    get:
      tags: [Accounts]
      summary: Listar cuentas (paginado)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Lista de cuentas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'
    post:
      tags: [Accounts]
      summary: Crear cuenta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '201':
          description: Cuenta creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
  /v1/api/accounts/{accountId}:
    get:
      tags: [Accounts]
      summary: Obtener cuenta por ID
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cuenta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
    put:
      tags: [Accounts]
      summary: Actualizar cuenta
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '200':
          description: Cuenta actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
    delete:
      tags: [Accounts]
      summary: Eliminar cuenta
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Cuenta eliminada
  /v1/api/movements:
    post:
      tags: [Movements]
      summary: Crear movimiento (publica evento Kafka)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovementRequest'
      responses:
        '201':
          description: Movimiento creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovementResponse'
  /v1/api/movements/{movementId}:
    get:
      tags: [Movements]
      summary: Obtener movimiento por ID
      parameters:
        - name: movementId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Movimiento encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovementResponse'
  /v1/api/movements/account/{numeroCuenta}:
    get:
      tags: [Movements]
      summary: Listar movimientos de una cuenta
      parameters:
        - name: numeroCuenta
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de movimientos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovementResponse'
  /v1/api/movements/account/{numeroCuenta}/last:
    get:
      tags: [Movements]
      summary: Obtener último movimiento de una cuenta
      parameters:
        - name: numeroCuenta
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Último movimiento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LastMovementResponse'
components:
  schemas:
    AccountRequest:
      type: object
      required: [numeroCuenta, tipo, saldoInicial, clienteNombre]
      properties:
        numeroCuenta:
          type: string
          pattern: '^[0-9-]+$'
          maxLength: 20
        tipo:
          type: string
          enum: [AHORRO, CORRIENTE]
        saldoInicial:
          type: number
          format: double
          minimum: 0
        estado:
          type: boolean
          default: true
        clienteNombre:
          type: string
    AccountResponse:
      type: object
      properties:
        numeroCuenta:
          type: string
        tipo:
          type: string
          enum: [AHORRO, CORRIENTE]
        saldoInicial:
          type: number
          format: double
        estado:
          type: boolean
        clienteNombre:
          type: string
    MovementRequest:
      type: object
      required: [numeroCuenta, valor, tipoMovimiento]
      properties:
        numeroCuenta:
          type: string
          pattern: '^[0-9-]+$'
          maxLength: 20
        valor:
          type: number
          format: double
          minimum: 1
        tipoMovimiento:
          type: string
          enum: [DEBITO, CREDITO]
    MovementResponse:
      type: object
      properties:
        numeroCuenta:
          type: string
        tipoCuenta:
          type: string
        saldoInicial:
          type: number
          format: double
        valor:
          type: number
          format: double
        tipoMovimiento:
          type: string
        saldo:
          type: number
          format: double
    LastMovementResponse:
      type: object
      properties:
        saldo:
          type: number
          format: double
        tipoCuenta:
          type: string