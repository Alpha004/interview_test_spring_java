spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: tech-test-spring
              uri: lb://tech-test-spring
              predicates:
                - Path=/v1/api/customers/**              
server:
  port: 8009
management:
  endpoint:
    health:
      show-details: always
    gateway:
      access: read-only
  endpoints:
    web:
      exposure:
        include: health,gateway
        
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka
                