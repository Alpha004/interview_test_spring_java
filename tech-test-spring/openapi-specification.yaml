openapi: 3.0.3
info:
  title: Customer Service API
  description: API para gestión de clientes y generación de reportes
  version: 1.0.0
servers:
  - url: http://localhost:8080
tags:
  - name: Customers
  - name: Reports
paths:
  /v1/api/customers:
    get:
      tags: [Customers]
      summary: Listar clientes (paginado)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Lista de clientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClienteResponse'
    post:
      tags: [Customers]
      summary: Crear cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
      responses:
        '201':
          description: Cliente creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteResponse'
  /v1/api/customers/{clientId}:
    get:
      tags: [Customers]
      summary: Obtener cliente por ID
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cliente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteResponse'
    put:
      tags: [Customers]
      summary: Actualizar cliente
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteRequest'
      responses:
        '200':
          description: Cliente actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteResponse'
    delete:
      tags: [Customers]
      summary: Eliminar cliente
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Cliente eliminado
  /v1/api/customers/reports/{clienteId}:
    get:
      tags: [Reports]
      summary: Generar reporte de movimientos
      parameters:
        - name: clienteId
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2024-01-01"
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2024-12-31"
        - name: format
          in: query
          schema:
            type: string
            enum: [json, excel]
            default: json
      responses:
        '200':
          description: Reporte generado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReportItem'
            application/octet-stream:
              schema:
                type: string
                format: binary
components:
  schemas:
    ClienteRequest:
      type: object
      required: [nombre, genero, identificacion]
      properties:
        nombre:
          type: string
          minLength: 2
          maxLength: 100
          pattern: '^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$'
        genero:
          type: string
        identificacion:
          type: string
          pattern: '^[0-9]{8}$'
          maxLength: 8
        direccion:
          type: string
        telefono:
          type: string
          pattern: '^9\d{8}$'
        contrasenia:
          type: string
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$'
        estado:
          type: boolean
    ClienteResponse:
      type: object
      properties:
        nombre:
          type: string
        genero:
          type: string
        identificacion:
          type: string
        direccion:
          type: string
        telefono:
          type: string
        estado:
          type: boolean
    ReportItem:
      type: object
      properties:
        cliente:
          type: string
        numeroCuenta:
          type: string
        tipo:
          type: string
        saldoInicial:
          type: number
        valorMovimiento:
          type: number
        tipoMovimiento:
          type: string
        saldoDisponible:
          type: number